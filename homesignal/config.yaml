name: HomeSignal
slug: homesignal
version: 0.1.3
description: Local HomeSignal agent for Home Assistant fleet management.
url: https://github.com/homesignal-io/homesignal-home-assistant-app
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
hassio_api: true
homeassistant_api: true
map:
  - addon_config:rw
ingress: true
ingress_port: 8099
ingress_entry: /
panel_title: HomeSignal
panel_icon: mdi:home-assistant
timeout: 300
options:
  cloud_base_url: ""
  aws_iot_endpoint: ""
  aws_region: ""
  fleet_provisioning_template: ""
schema:
  cloud_base_url: str?
  aws_iot_endpoint: str?
  aws_region: str?
  fleet_provisioning_template: str?
